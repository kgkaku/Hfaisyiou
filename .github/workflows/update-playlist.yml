name: Update Toffee Playlist

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'scripts/**'
      - '.github/workflows/**'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    name: Generate Toffee M3U Playlist
    timeout-minutes: 15
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Create directories
        run: |
          mkdir -p playlists
          mkdir -p logs
          mkdir -p proxies
      
      - name: Generate Toffee M3U Playlist
        id: generate
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        run: |
          python scripts/toffee_api.py
          
          if [ -f "playlists/toffee_playlist.m3u" ]; then
            CHANNEL_COUNT=$(grep -c '#EXTINF' playlists/toffee_playlist.m3u || true)
            WORKING_COUNT=$(grep -c '#EXTHTTP' playlists/toffee_playlist.m3u || true)
            
            echo "status=success" >> $GITHUB_OUTPUT
            echo "playlist_size=$(wc -c < playlists/toffee_playlist.m3u)" >> $GITHUB_OUTPUT
            echo "channel_count=$CHANNEL_COUNT" >> $GITHUB_OUTPUT
            echo "working_count=$WORKING_COUNT" >> $GITHUB_OUTPUT
            echo "✅ Playlist generated: $WORKING_COUNT/$CHANNEL_COUNT channels working"
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi
        continue-on-error: true
      
      - name: Create timestamp
        run: |
          echo "Last updated: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" > playlists/last_updated.txt
          echo "Total channels: ${{ steps.generate.outputs.channel_count }}" >> playlists/last_updated.txt
          echo "Working channels: ${{ steps.generate.outputs.working_count }}" >> playlists/last_updated.txt
      
      - name: Pull latest changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git pull --rebase origin main
        continue-on-error: true
      
      - name: Commit and push changes
        run: |
          git add playlists/
          git add proxies/ || true
          git add logs/ || true
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update playlist: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            git push origin main
          fi
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: toffee-playlists-${{ github.run_id }}
          path: |
            playlists/
            logs/
            proxies/
          retention-days: 7
